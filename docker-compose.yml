services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mining
      POSTGRES_PASSWORD: mining123
      POSTGRES_DB: mining_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mining -d mining_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://mining:mining123@db:5432/mining_db
      UPLOAD_DIR: /app/uploads
    volumes:
      - ./uploads:/app/uploads
      - .:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
